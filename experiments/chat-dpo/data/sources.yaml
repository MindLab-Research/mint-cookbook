train_sources:
  - name: scaffold_placeholder_train_pairs
    type: local_jsonl
    full_path: data/train/full.jsonl
    smoke_path: data/train/smoke.jsonl
    note: Tiny checked-in placeholder rows used only to validate the experiment contract; the smoke/full files may initially contain the same local rows.

eval_sources:
  - name: scaffold_placeholder_eval_pairs
    type: local_jsonl
    full_path: data/eval/full.jsonl
    smoke_path: data/eval/smoke.jsonl
    note: Tiny checked-in held-out placeholder rows used only to validate eval-only and artifact wiring; the smoke/full files may initially contain the same local rows.

layout:
  default_train_path: data/train/full.jsonl
  default_eval_path: data/eval/full.jsonl
  bare_dry_run_eval_path: data/eval/smoke.jsonl
  bare_eval_only_eval_path: data/eval/full.jsonl
  preferred_smoke_paths:
    - data/train/smoke.jsonl
    - data/eval/smoke.jsonl

labeling:
  canonical_semantics: chosen is preferred over rejected
  compatibility_inputs:
    - messages/chosen/rejected
    - prompt/chosen/rejected
    - prompt_conversation/completion_A/completion_B plus label
    - comparison plus label

deduplication:
  unit: prompt_fingerprint
  note: dry-run and train/eval overlap audit compare normalized prompt-message fingerprints

overlap_audit:
  train_eval_key: prompt_fingerprint
  failure_policy: training and eval overlap is a hard error outside dry-run

grouping:
  default_key: group_id
  fallback: prompt_fingerprint
  note: repeated prompts may be spread across batches to avoid same-prompt pairs clustering in one step

migration_notes:
  legacy_reference_repo: local legacy chat_dpo checkout (path intentionally omitted from checked-in provenance)
  repo_native_runtime: mint
  repo_native_entrypoint: experiments/chat-dpo/train.py
